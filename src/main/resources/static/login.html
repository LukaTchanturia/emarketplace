<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f7f8fa; }
        .header { background-color: #7b61ff; padding: 15px 30px; }
        .header a { text-decoration: none; color: white; font-size: 24px; font-weight: bold; }
        .form-container { max-width: 400px; margin: 60px auto; background: white; padding: 40px; border-radius: 8px; }
        h2 { text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #7b61ff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error { color: red; font-size: 14px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header"><a href="index.html">eMarketplace</a></div>

<div class="form-container">
    <h2>Login</h2>
    <div class="form-group">
        <label>Username or Email</label>
        <input type="text" id="logId">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="logPass">
    </div>
    <button onclick="login()">Login</button>
    <div id="errMsg" class="error"></div>
</div>

<script>
    function login() {
        const id = document.getElementById('logId').value;
        const pass = document.getElementById('logPass').value;

        fetch('/users/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({login: id, password: pass})
        }).then(async res => {
            if(res.ok) {
                const user = await res.json();
                localStorage.setItem("userId", user.id);
                localStorage.setItem("username", user.username);
                window.location.href = "index.html";
            } else {
                document.getElementById('errMsg').innerText = await res.text();
            }
        });
    }
</script>
</body>
</html>
