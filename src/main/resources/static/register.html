<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f7f8fa; }
        .header { background-color: #7b61ff; padding: 15px 30px; }
        .header a { text-decoration: none; color: white; font-size: 24px; font-weight: bold; }
        .form-container { max-width: 400px; margin: 60px auto; background: white; padding: 40px; border-radius: 8px; }
        h2 { text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #7b61ff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error { color: red; font-size: 14px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header"><a href="index.html">eMarketplace</a></div>

<div class="form-container">
    <h2>Create Account</h2>
    <div class="form-group">
        <label>Username (8-16 chars, letters/numbers only)</label>
        <input type="text" id="regUser">
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPass">
    </div>
    <div class="form-group">
        <label>Birthday</label>
        <input type="date" id="regBirth">
    </div>
    <button onclick="register()">Register</button>
    <div id="errMsg" class="error"></div>
</div>

<script>
    function register() {
        const u = document.getElementById('regUser').value;
        const e = document.getElementById('regEmail').value;
        const p = document.getElementById('regPass').value;
        const b = document.getElementById('regBirth').value;

        fetch('/users/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, email: e, password: p, birthday: b})
        }).then(async res => {
            if(res.ok) {
                alert("Registered successfully! Please log in.");
                window.location.href = "login.html";
            } else {
                document.getElementById('errMsg').innerText = await res.text();
            }
        });
    }
</script>
</body>
</html>
